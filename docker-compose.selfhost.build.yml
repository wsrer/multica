# Development override: build the backend/web/docs images from the current checkout
# instead of pulling the official GHCR images.

services:
  backend:
    image: multica-backend:dev
    build:
      context: .
      dockerfile: Dockerfile

  frontend:
    image: multica-web:dev
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        REMOTE_API_URL: http://backend:8080
        DOCS_URL: http://docs:4000
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_APP_VERSION: dev

  docs:
    image: multica-docs:dev
    build:
      context: .
      dockerfile: Dockerfile.docs
